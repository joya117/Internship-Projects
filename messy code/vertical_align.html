<!DOCTYPE html>
<html>
    <head>
        <style>
            img.toptext { vertical-align: top; }
            img.bottomtext { vertical-align: bottom;}
        </style>
    </head>
    <body>
        <p><img src="flower.jpeg" alt="flower image" class="toptext"> Top align text</p>
        <p><img src="flower.jpeg" alt="flower image" class="bottomtext"> Bottom align text</p>
    </body>
</html>
