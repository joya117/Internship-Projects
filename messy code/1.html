<!DOCTYPE html>
<html>
  <head>
    <title>Container vs Container-fluid</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body>

    <!-- Full-width header -->
    <div class="container-fluid bg-primary text-white p-3">
      <h1>Full-width Header</h1>
      <p>This blue area touches both sides of the screen.</p>
    </div>

    <!-- Centered content -->
    <div class="container bg-danger text-white my-4">
      <h2>Centered Content</h2>
      <p>This content is in the center with empty space on left and right.</p>
    </div>

    <!-- Full-width footer -->
    <div class="container-fluid bg-dark text-white p-3">
      <h3>Full-width Footer</h3>
      <p>This dark area also stretches from left edge to right edge.</p>
    </div>

  </body>
</html>
