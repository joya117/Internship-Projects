<!DOCTYPE html>
<html>
    <head>
        <style>
            .first_border { border-style: dotted;}

            .second_border { border-style: dashed;}

            .third_border { border-style: double;}

            .forth_border { border-style: solid;}

            .fifth_border { border-style: groove;}

            .sixth_border { border-style: ridge;}

            .seventh_border { border-style: inset;}

            .eighth_border { border-style: outset;}

            .ninth_border { border-style: none;}

            .tenth_border { border-style: hidden;}
        </style>
    </head>

        <body>
            <p class="first_border">Border</p>

            <p class="second_border">Border</p>

            <p class="third_border">Border</p>

            <p class="forth_border">Border</p>

            <p class="fifth_border">Border</p>

            <p class="sixth_border">Border</p>

            <p class="seventh_border">Border</p>

            <p class="eighth_border">Border</p>

            <p class="ninth_border">Border</p>

            <p class="tenth_border">Border</p>

            <p style="border-style: solid; border-width: 5px; border-color: brown;">My name is Joya</p>
        </body>
</html>
