<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collab Notes — CampusSync</title>
    <meta name="description" content="Collaborative notes and group study tools on CampusSync." />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="live-classroom.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-logo"><i class="fa-solid fa-graduation-cap"></i></span>
          <h1 class="sidebar-brand">Campus<span class="sync">Sync</span></h1>
        </div>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
          <a href="courses.html" class="sidebar-link"><i class="fa-solid fa-book-open"></i><span>Courses</span></a>
          <a href="calendar.html" class="sidebar-link"><i class="fa-solid fa-calendar-days"></i><span>Calendar</span></a>
          <a href="live-classroom.html" class="sidebar-link active"><i class="fa-solid fa-pen-to-square"></i><span>Collab Notes</span></a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-card">
            <div class="user-avatar">J</div>
            <div><span class="user-name">Joya</span><span class="user-role">Computer Science</span></div>
          </div>
          <button class="logout-link" onclick="window.location.href='login.html'"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
      </aside>

      <!-- Main -->
      <main class="main-content classroom-main">
        <!-- Notes Editor -->
        <div class="notes-col">
          <div class="card notes-panel">
            <div class="card-header">
              <h3><i class="fa-solid fa-file-lines"></i> <span id="noteTitle">My Notes</span></h3>
              <div class="notes-actions">
                <button class="btn-primary btn-sm" onclick="inviteCollaborator()"><i class="fa-solid fa-user-plus"></i> Invite</button>
                <button class="btn-secondary btn-sm" onclick="shareNotes()"><i class="fa-solid fa-share-nodes"></i> Share</button>
              </div>
            </div>

            <!-- Editor -->
            <div class="editor-wrap">
              <div class="editor-toolbar">
                <button title="Bold"><i class="fa-solid fa-bold"></i></button>
                <button title="Italic"><i class="fa-solid fa-italic"></i></button>
                <button title="Underline"><i class="fa-solid fa-underline"></i></button>
                <div class="toolbar-sep"></div>
                <button title="List"><i class="fa-solid fa-list"></i></button>
                <button title="Checklist"><i class="fa-solid fa-check-square"></i></button>
                <div class="toolbar-sep"></div>
                <button title="Heading"><i class="fa-solid fa-heading"></i></button>
                <button title="Quote"><i class="fa-solid fa-quote-left"></i></button>
                <button title="Code"><i class="fa-solid fa-code"></i></button>
                <div class="toolbar-sep"></div>
                <button title="Link"><i class="fa-solid fa-link"></i></button>
                <button title="Image"><i class="fa-solid fa-image"></i></button>
                <button title="Table"><i class="fa-solid fa-table"></i></button>
              </div>
              <textarea class="notes-textarea" id="notesEditor" placeholder="Start typing your notes here..."></textarea>
            </div>

            <!-- Status -->
            <div class="editor-status">
              <span class="status-label">You are editing</span>
              <span class="status-saved" id="saveStatus">Ready</span>
            </div>

            <!-- Video Call -->
            <div class="video-bar">
              <div><h4>Start Video Call</h4><p>Discuss while editing together</p></div>
              <button class="btn-secondary btn-sm" onclick="startVideoCall()"><i class="fa-solid fa-phone"></i> Start Call</button>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <aside class="right-col">
          <div class="right-row">
            <div class="card mini-panel">
              <div class="card-header"><h3><i class="fa-solid fa-user-group"></i> My Groups</h3></div>
              <div class="group-list" id="groupsList"><div class="empty-hint">No groups yet.</div></div>
              <button class="btn-ghost" onclick="createNewGroup()" style="width:100%;margin-top:8px"><i class="fa-solid fa-plus"></i> Create Group</button>
            </div>
            <div class="card mini-panel">
              <div class="card-header"><h3><i class="fa-solid fa-users"></i> Members</h3></div>
              <div class="members-list" id="membersList">
                <div class="member-item">
                  <div class="member-dot" style="background:var(--primary)">J</div>
                  <div><h4>You</h4><p>Owner</p></div>
                </div>
              </div>
              <button class="btn-ghost" onclick="addMember()" style="width:100%;margin-top:8px"><i class="fa-solid fa-user-plus"></i> Add Member</button>
            </div>
          </div>

          <!-- Chat -->
          <div class="card chat-panel">
            <div class="card-header"><h3><i class="fa-solid fa-comments"></i> Group Chat</h3></div>
            <div class="chat-messages" id="chatMessages">
              <div class="chat-hint">Start a conversation! Add members to collaborate.</div>
            </div>
            <div class="chat-input-row">
              <input type="text" id="chatInput" placeholder="Type message..." />
              <button class="btn-primary btn-icon" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="live-classroom-data.js"></script>
    <script src="live-classroom.js"></script>
  </body>
</html>
