<!DOCTYPE html>
<html lang="en">
    <head>
         <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, scale=1.o">
        <title>Document</title>
        <style>
            .bulb{
                margin-top: 300px;
                border-style: solid;
                margin-left: 600px;
                margin-right: 600px;
            }
            #Image{
                padding-top: 80px;
                padding-left: 60px;
                padding-right: 60px;
                padding-bottom: 50px;
            }
            p{
                padding-left: 25px;
            }
        </style>
    </head>
    <body>
        <script>
            function turnonoff(){
                let image=document.getElementById('Image');
                if(image.src.match("ONbulb"))
                image.src="http://ittrainingclasses.in/OFFbulb.jpg"
                else if(image.src.match("OFFbulb"))
                image.src="http://ittrainingclasses.in/ONbulb.jpg"
            }    
        </script>
        <div class="bulb">
            <img id="Image" onclick="turnonoff()" src="http://ittrainingclasses.in/OFFbulb.jpg"/>
            <p>Click for ON and OFF on bulb</p>
        </div>
    </body>
</html>
