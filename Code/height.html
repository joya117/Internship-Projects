<!DOCTYPE html>
<html>
    <head>
        <style>
            h3.height {line-height: 80px;}
        </style>
    </head>
    <body>
        <h3>We can define any height within the element though the line-height property.</h3>
        <h3 class="height">We can define any height within the element though the line-height property.</h3>
    </body>
</html>
