<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Bootstrap scrollspy</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body data-bs-spy="scroll" data-bs-target=".navbar" data-bs-offset="50">
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#section1">Section 1</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#section2">Section 2</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#section3">Section 3</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#section4">Section 4</a>
                </li>
            </ul>
        </nav>

        <div id="section1" class="container-fluid bg-success" style="padding-top: 70px; padding-bottom: 70px;">
            <h1>Section 1</h1>
            <p>This is Section 1</p>
        </div>

        <div id="section2" class="container-fluid bg-warning" style="padding-top: 70px; padding-bottom: 70px;">
            <h1>Section 2</h1>
            <p>This is Section 2</p>
        </div>

        <div id="section3" class="container-fluid bg-info" style="padding-top: 70px; padding-bottom: 70px;">
            <h1>Section 3</h1>
            <p>This is Section 3</p>
        </div>

        <div id="section4" class="container-fluid  bg-secondary" style="padding-top: 70px; padding-bottom: 70px;">
            <h1>Section 4</h1>
            <p>This is Section 4</p>
        </div>

    </body>
</html>
